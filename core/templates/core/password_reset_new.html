{% extends "core/base.html" %}

{% block title %}Password Reset New | UPGCExam{% endblock %}
{% block content %}
<div class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
            <div class="text-center mb-6">
                <a href="{% url 'accueil' %}" class="text-2xl font-black text-[#0037B0] tracking-tight">UPGCExam</a>
                <h1 class="text-xl font-bold text-[#0B1C30] mt-4">Nouveau mot de passe</h1>
                <p class="text-sm text-gray-500 mt-1">Choisissez un nouveau mot de passe pour votre compte.</p>
            </div>

    

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <input type="hidden" name="email" value="{{ email }}">
                
                <div class="input-wrap">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <input type="password" name="password" placeholder="Nouveau mot de passe" class="form-input" required minlength="8">
                </div>

                <div class="input-wrap">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <input type="password" name="password2" placeholder="Confirmer le mot de passe" class="form-input" required minlength="8">
                </div>

                <button type="submit" class="btn-primary">Réinitialiser mon mot de passe</button>
            </form>
        </div>
    </div>
{% endblock %}
