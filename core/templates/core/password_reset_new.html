<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe — UPGCExam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        html, body { height: 100%; margin: 0; }
        body {
            background-color: #edf0f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .input-wrap { position: relative; display: flex; align-items: center; }
        .input-icon {
            position: absolute;
            left: 16px;
            color: #9ca3af;
            width: 18px; height: 18px;
            flex-shrink: 0;
            pointer-events: none;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid #d1d5db;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: white;
        }
        .form-input:focus {
            border-color: #0037B0;
            box-shadow: 0 0 0 3px rgba(0,55,176,0.1);
        }
        .btn-primary {
            background: #0037B0;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }
        .btn-primary:hover { background: #002A8A; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
            <div class="text-center mb-6">
                <a href="{% url 'accueil' %}" class="text-2xl font-black text-[#0037B0] tracking-tight">UPGCExam</a>
                <h1 class="text-xl font-bold text-[#0B1C30] mt-4">Nouveau mot de passe</h1>
                <p class="text-sm text-gray-500 mt-1">Choisissez un nouveau mot de passe pour votre compte.</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-3 rounded-lg text-sm {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-200{% else %}bg-green-50 text-green-600 border border-green-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <input type="hidden" name="email" value="{{ email }}">
                
                <div class="input-wrap">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <input type="password" name="password" placeholder="Nouveau mot de passe" class="form-input" required minlength="8">
                </div>

                <div class="input-wrap">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <input type="password" name="password2" placeholder="Confirmer le mot de passe" class="form-input" required minlength="8">
                </div>

                <button type="submit" class="btn-primary">Réinitialiser mon mot de passe</button>
            </form>
        </div>
    </div>
    {% include "core/includes/footer.html" %}
</body>
</html>
