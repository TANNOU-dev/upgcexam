<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code de réinitialisation — UPGCExam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        html, body { height: 100%; margin: 0; }
        body {
            background-color: #edf0f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .code-input {
            width: 100%;
            max-width: 280px;
            padding: 18px;
            border: 2px dashed #0037B0;
            border-radius: 16px;
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            letter-spacing: 12px;
            outline: none;
            background: #F0F4FF;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin: 0 auto;
        }
        .code-input:focus {
            border-color: #002A8A;
            box-shadow: 0 0 0 4px rgba(0,55,176,0.15);
        }
        .code-input::placeholder { letter-spacing: 2px; font-size: 16px; font-weight: 400; color: #9ca3af; }
        .btn-primary {
            background: #0037B0;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            max-width: 280px;
        }
        .btn-primary:hover { background: #002A8A; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md text-center">
            <div class="mb-6">
                <a href="{% url 'accueil' %}" class="text-2xl font-black text-[#0037B0] tracking-tight">UPGCExam</a>
                <h1 class="text-xl font-bold text-[#0B1C30] mt-4">Code de vérification</h1>
                <p class="text-sm text-gray-500 mt-1">Un code à 6 chiffres a été envoyé à <strong>{{ email }}</strong>.</p>
                <p class="text-xs text-gray-400 mt-1">Valable 10 minutes.</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-3 rounded-lg text-sm {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-200{% else %}bg-green-50 text-green-600 border border-green-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <input type="hidden" name="email" value="{{ email }}">
                <div>
                    <input type="text" name="code" class="code-input" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" required>
                </div>
                <button type="submit" class="btn-primary">Vérifier le code</button>
            </form>

            <div class="mt-6">
                <a href="{% url 'password_reset' %}" class="text-sm text-gray-500 hover:underline">← Retour</a>
            </div>
        </div>
    </div>
    {% include "core/includes/footer.html" %}
</body>
</html>
