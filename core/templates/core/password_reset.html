<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié — UPGCExam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        html, body { height: 100%; margin: 0; }
        body {
            background-color: #edf0f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .input-wrap { position: relative; display: flex; align-items: center; }
        .input-icon {
            position: absolute;
            left: 16px;
            color: #9ca3af;
            width: 18px; height: 18px;
            flex-shrink: 0;
            pointer-events: none;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid #d1d5db;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: white;
        }
        .form-input:focus {
            border-color: #0037B0;
            box-shadow: 0 0 0 3px rgba(0,55,176,0.1);
        }
        .btn-primary {
            background: #0037B0;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }
        .btn-primary:hover { background: #002A8A; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
            <!-- Logo / Titre -->
            <div class="text-center mb-6">
                <a href="{% url 'accueil' %}" class="text-2xl font-black text-[#0037B0] tracking-tight">UPGCExam</a>
                <h1 class="text-xl font-bold text-[#0B1C30] mt-4">Mot de passe oublié</h1>
                <p class="text-sm text-gray-500 mt-1">Saisissez votre adresse email pour recevoir un lien de réinitialisation.</p>
            </div>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div class="input-wrap">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <input type="email" name="email" id="id_email" placeholder="Votre adresse email" class="form-input" required autocomplete="email">
                </div>
                {% if form.email.errors %}
                <div class="bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-200">
                    {% for error in form.email.errors %}{{ error }}{% endfor %}
                </div>
                {% endif %}

                <button type="submit" class="btn-primary">Envoyer le lien</button>
            </form>

            <div class="text-center mt-6">
                <p class="text-sm text-gray-500">
                    <a href="{% url 'connexion' %}" class="text-[#0037B0] font-semibold hover:underline">← Retour à la connexion</a>
                </p>
            </div>
        </div>
    </div>
    {% include "core/includes/footer.html" %}
</body>
</html>
