{% extends "core/base.html" %}

{% block title %}Password Reset | UPGCExam{% endblock %}
{% block content %}
<div class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
            <div class="text-center mb-6">
                <a href="{% url 'accueil' %}" class="text-2xl font-black text-[#0037B0] tracking-tight">UPGCExam</a>
                <h1 class="text-xl font-bold text-[#0B1C30] mt-4">Mot de passe oublié</h1>
                <p class="text-sm text-gray-500 mt-1">Saisissez votre email pour recevoir un code de réinitialisation.</p>
            </div>

    

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div class="input-wrap">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <input type="email" name="email" placeholder="Votre adresse email" class="form-input" required autocomplete="email">
                </div>

                <button type="submit" class="btn-primary">Envoyer le code</button>
            </form>

            <div class="text-center mt-6">
                <p class="text-sm text-gray-500">
                    <a href="{% url 'connexion' %}" class="text-[#0037B0] font-semibold hover:underline">← Retour à la connexion</a>
                </p>
            </div>
        </div>
    </div>
{% endblock %}
