<script>
var vapidPublicKey = '{{ vapid_public_key|escapejs }}';

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function() {});
}

function abonnerPush() {
    if (!vapidPublicKey || !('Notification' in window) || !('PushManager' in window)) return;
    if (Notification.permission === 'denied') return;

    Notification.requestPermission().then(function(perm) {
        if (perm !== 'granted') return;

        navigator.serviceWorker.ready.then(function(reg) {
            reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(vapidPublicKey)
            }).then(function(sub) {
                fetch('/pwa/subscribe/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
                    body: JSON.stringify(sub.toJSON())
                });
            }).catch(function() {});
        });
    });
}

function urlBase64ToUint8Array(base64String) {
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    var rawData = window.atob(base64);
    return Uint8Array.from(rawData, function(character) { return character.charCodeAt(0); });
}

function getCSRF() {
    var name = 'csrftoken';
    if (document.cookie.indexOf(name + '=') !== -1) {
        return document.cookie.split('; ')
            .find(function(r) { return r.startsWith(name + '='); })
            .split('=')[1];
    }
    return '';
}

window.addEventListener('load', function() {
    var authenticated = document.querySelector('meta[name="user-authenticated"]');
    if (vapidPublicKey && authenticated && 'Notification' in window && Notification.permission === 'default') {
        setTimeout(function() {
            var banner = document.createElement('div');
            banner.className = 'fixed bottom-4 right-4 bg-[#0037B0] text-white text-sm px-4 py-3 rounded-lg shadow-lg z-50 cursor-pointer hover:bg-[#002A8A] transition';
            banner.textContent = '🔔 Activer les notifications UPGCExam';
            banner.onclick = function() {
                abonnerPush();
                banner.remove();
            };
            var closeBtn = document.createElement('span');
            closeBtn.className = 'ml-3 text-white/60 hover:text-white cursor-pointer';
            closeBtn.textContent = '✕';
            closeBtn.onclick = function() { banner.remove(); return false; };
            banner.appendChild(closeBtn);
            document.body.appendChild(banner);
        }, 3000);
    }
});
</script>
