<script>
(function() {
    if (!document.querySelector('meta[name="user-authenticated"]')) return;

    // Chaque page envoie des DELTAS de temps (secondes écoulées depuis
    // le dernier envoi). Le serveur accumule dans PresenceSession.
    // → Pas de sessionStorage : chaque utilisateur a son propre compteur
    //   même en changeant de compte dans le même onglet.
    var dernierEnvoi = Date.now();
    var ws = null;
    var timer = null;

    function connecter() {
        var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        var url = protocol + '//' + window.location.host + '/ws/presence/';

        ws = new WebSocket(url);

        ws.onopen = function() {
            dernierEnvoi = Date.now();
            envoyerDelta();
            timer = setInterval(envoyerDelta, 10000);
        };

        ws.onclose = function() {
            if (timer) clearInterval(timer);
            timer = null;
            ws = null;
            setTimeout(connecter, 3000);
        };

        ws.onerror = function() {};
    }

    function envoyerDelta() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        var maintenant = Date.now();
        var delta = Math.floor((maintenant - dernierEnvoi) / 1000);
        if (delta <= 0) return;
        dernierEnvoi = maintenant;
        ws.send(JSON.stringify({ seconds: delta }));
    }

    // onbeforeunload : on ferme juste la socket (le dernier delta
    // a été envoyé il y a <10s → perte acceptable)
    window.addEventListener('beforeunload', function() {
        if (ws) ws.close();
    });

    connecter();
})();
</script>
