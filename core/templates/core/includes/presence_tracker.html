<script>
(function() {
    if (!document.querySelector('meta[name="user-authenticated"]')) return;

    // sessionStorage persiste entre les pages (même onglet)
    // → le compteur de temps continue après une navigation
    if (!sessionStorage.getItem('upg_presence_start')) {
        sessionStorage.setItem('upg_presence_start', Date.now());
    }
    var debut = parseInt(sessionStorage.getItem('upg_presence_start'), 10);
    var ws = null;
    var timer = null;

    function connecter() {
        var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        var url = protocol + '//' + window.location.host + '/ws/presence/';

        ws = new WebSocket(url);

        ws.onopen = function() {
            envoyerTemps(); // premier envoi immédiat
            timer = setInterval(envoyerTemps, 10000); // puis toutes les 10s
        };

        ws.onclose = function() {
            if (timer) clearInterval(timer);
            timer = null;
            ws = null;
            // Reconnexion après 3s
            setTimeout(connecter, 3000);
        };

        ws.onerror = function() {
            // Déjà géré par onclose
        };
    }

    function envoyerTemps() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        var ecoule = Math.floor((Date.now() - debut) / 1000);
        ws.send(JSON.stringify({ seconds: ecoule }));
    }

    // Envoyer avant de quitter ou de cacher la page
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) envoyerTemps();
    });
    window.addEventListener('beforeunload', function() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ seconds: Math.floor((Date.now() - debut) / 1000) }));
            ws.close();
        }
    });

    // Démarrer la connexion
    connecter();
})();
</script>
